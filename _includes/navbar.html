<nav class="navbar" aria-label="Main navigation">
  <!-- Mobile: hamburger to reveal sidebar -->
  <button class="navbar__toggle" aria-label="Toggle sidebar" onclick="toggleSidebar()">
    <i class="fas fa-bars" aria-hidden="true"></i>
  </button>

  <!-- Nav links (always visible) -->
  <ul class="navbar__links">
    <li>
      <a href="{{ '/' | relative_url }}" {% if page.url == '/' %}class="active"{% endif %}>
        Home
      </a>
    </li>
    {% for link in site.header_pages %}
      {% assign node = site.pages | where: "path", link | first %}
      {% if node %}
      <li>
        <a href="{{ node.url | relative_url }}" {% if page.url == node.url %}class="active"{% endif %}>
          {{ node.title }}
        </a>
      </li>
      {% endif %}
    {% endfor %}
  </ul>
</nav>

<script>
function toggleSidebar() {
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('sidebar-overlay');
  sidebar.classList.toggle('wrapper__sidebar--open');
  overlay.classList.toggle('active');
}
</script>
<div id="sidebar-overlay" class="sidebar-overlay" onclick="toggleSidebar()"></div>
